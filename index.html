<!doctype html>
<html lang="ms" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itinerari Cameron Highlands Realistik</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfa; }
    .font-heading { font-family: 'Playfair Display', serif; }
    .tab-active { background-color: #2d5016; color: white; box-shadow: 0 4px 12px rgba(45, 80, 22, 0.2); }
    .edit-input { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; font-size: 0.9rem; transition: all 0.2s; }
    .edit-input:focus { outline: none; border-color: #2d5016; ring: 2px ring-[#2d5016]; }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="min-h-full pb-20">
   
   <!-- Header Modern -->
   <header class="bg-[#1a3a0a] text-white pt-12 pb-20 px-6 rounded-b-[40px] shadow-2xl relative overflow-hidden">
    <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -mr-20 -mt-20 blur-3xl"></div>
    <div class="max-w-3xl mx-auto relative z-10">
     <div class="flex justify-between items-start mb-6">
       <div>
         <h1 class="font-heading text-4xl mb-2" id="mainTitle">Meneroka Cameron</h1>
         <p class="text-green-200/80 italic">Perjalanan 3 Hari 2 Malam yang Fleksibel</p>
       </div>
       <button onclick="toggleEditMode()" id="editBtn" class="bg-white/10 hover:bg-white/20 p-3 rounded-2xl backdrop-blur-md transition-all">
         <i data-lucide="settings-2" class="w-6 h-6"></i>
       </button>
     </div>
     
     <!-- Tabs -->
     <div class="flex gap-2 bg-black/20 p-1.5 rounded-2xl backdrop-blur-sm">
       <button onclick="showDay(1)" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-bold transition-all tab-active" data-day="1">HARI 1</button>
       <button onclick="showDay(2)" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-bold transition-all" data-day="2">HARI 2</button>
       <button onclick="showDay(3)" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-bold transition-all" data-day="3">HARI 3</button>
     </div>
    </div>
   </header>

   <!-- Content Section -->
   <main class="max-w-3xl mx-auto px-6 -mt-10">
     <div id="content" class="space-y-6">
       <!-- Content injected by JS -->
     </div>
   </main>

   <!-- Floating Save Indicator -->
   <div id="saveIndicator" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full text-sm font-bold hidden items-center gap-2 shadow-xl z-50">
     <i data-lucide="check-circle-2" class="w-4 h-4 text-green-400"></i> Mod Sunting Aktif
   </div>
  </div>

  <script>
// Data dengan gambar "Sebenar" (Specific landmarks)
const defaultData = [
  {
    day: 1,
    items: [
      { id: '1-1', time: "08:00", title: "Perjalanan Ke Cameron", desc: "Melalui Simpang Pulai untuk jalan lebih selesa.", type: "travel", image: "https://images.unsplash.com/photo-1590001158193-780d0adee27b?auto=format&fit=crop&w=800", waze: "" },
      { id: '1-2', time: "12:00", title: "Lunch @ Barracks Cafe", desc: "Makan dalam bangunan bersejarah berek tentera.", type: "food", image: "https://lh5.googleusercontent.com/p/AF1QipN3p_A6V_Z9X-76-2mD7zBwVzC2J3uU2iS8rE1v=w800", waze: "https://waze.com/ul?q=Barracks+Cafe" },
      { id: '1-3', time: "14:30", title: "BOH Tea Centre (Sungei Palas)", desc: "Menikmati teh di kafe 'terapung' atas ladang teh.", type: "visit", image: "https://images.unsplash.com/photo-1597485356948-436446a80486?auto=format&fit=crop&w=800", waze: "https://waze.com/ul?q=BOH+Sungei+Palas" },
      { id: '1-4', time: "16:30", title: "Mossy Forest", desc: "Berjalan di boardwalk hutan berlumut tertua.", type: "visit", image: "https://images.unsplash.com/photo-1542332213-9b5a5a3fad35?auto=format&fit=crop&w=800", waze: "https://waze.com/ul?q=Mossy+Forest" }
    ]
  },
  {
    day: 2,
    items: [
      { id: '2-1', time: "09:00", title: "Big Red Strawberry Farm", desc: "Petik strawberi dan makan aiskrim segar.", type: "visit", image: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?auto=format&fit=crop&w=800", waze: "https://waze.com/ul?q=Big+Red+Strawberry" },
      { id: '2-2', time: "11:00", title: "Lavender Garden", desc: "Pemandangan bunga warna-warni yang sangat cantik.", type: "visit", image: "https://images.unsplash.com/photo-1499002238440-d264edd596ec?auto=format&fit=crop&w=800", waze: "https://waze.com/ul?q=Cameron+Lavender+Garden" },
      { id: '2-3', time: "14:00", title: "Kea Farm Market", desc: "Beli jagung mutiara dan sayur-sayuran segar.", type: "visit", image: "https://images.unsplash.com/photo-1488459716781-31db52582fe9?auto=format&fit=crop&w=800", waze: "https://waze.com/ul?q=Kea+Farm" }
    ]
  },
  {
    day: 3,
    items: [
      { id: '3-1', time: "09:00", title: "Cameron Flora Park", desc: "Tempat paling 'instagrammable' dengan bunga ala Eropah.", type: "visit", image: "https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&fit=crop&w=800", waze: "https://waze.com/ul?q=Cameron+Flora+Park" },
      { id: '3-2', time: "12:00", title: "Check Out & Pulang", desc: "Singgah beli cenderamata terakhir sebelum turun.", type: "travel", image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800", waze: "" }
    ]
  }
];

let itinerary = JSON.parse(localStorage.getItem('my_cameron_trip')) || defaultData;
let currentDay = 1;
let isEditMode = false;

function toggleEditMode() {
  isEditMode = !isEditMode;
  document.getElementById('saveIndicator').style.display = isEditMode ? 'flex' : 'none';
  document.getElementById('editBtn').classList.toggle('bg-green-500');
  renderDay(currentDay);
}

function updateItem(dayNum, itemId, field, value) {
  const day = itinerary.find(d => d.day === dayNum);
  const item = day.items.find(i => i.id === itemId);
  if (item) {
    item[field] = value;
    localStorage.setItem('my_cameron_trip', JSON.stringify(itinerary));
  }
}

function removeItem(dayNum, itemId) {
  if(confirm('Padam aktiviti ini?')) {
    const day = itinerary.find(d => d.day === dayNum);
    day.items = day.items.filter(i => i.id !== itemId);
    localStorage.setItem('my_cameron_trip', JSON.stringify(itinerary));
    renderDay(dayNum);
  }
}

function addNewSlot(dayNum) {
  const day = itinerary.find(d => d.day === dayNum);
  day.items.push({
    id: Date.now().toString(),
    time: "12:00",
    title: "Tempat Baru",
    desc: "Deskripsi aktiviti anda",
    type: "visit",
    image: "https://images.unsplash.com/photo-1527786356703-4b100091cd2c?w=800",
    waze: ""
  });
  localStorage.setItem('my_cameron_trip', JSON.stringify(itinerary));
  renderDay(dayNum);
}

function showDay(day) {
  currentDay = day;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('tab-active', parseInt(btn.dataset.day) === day);
  });
  renderDay(day);
}

function renderDay(dayNum) {
  const data = itinerary.find(d => d.day === dayNum);
  const container = document.getElementById('content');
  container.innerHTML = '';

  data.items.sort((a, b) => a.time.localeCompare(b.time)).forEach(item => {
    const div = document.createElement('div');
    div.className = "bg-white rounded-[32px] overflow-hidden shadow-sm border border-gray-100 fade-in relative";
    
    if (isEditMode) {
      div.innerHTML = `
        <div class="p-6">
          <div class="flex justify-between mb-4">
            <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Sunting Aktiviti</span>
            <button onclick="removeItem(${dayNum}, '${item.id}')" class="text-red-400"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
          </div>
          <div class="grid grid-cols-2 gap-2">
             <input type="time" class="edit-input font-bold" value="${item.time}" onchange="updateItem(${dayNum}, '${item.id}', 'time', this.value)">
             <select class="edit-input" onchange="updateItem(${dayNum}, '${item.id}', 'type', this.value)">
                <option value="visit" ${item.type === 'visit' ? 'selected' : ''}>Lawatan</option>
                <option value="food" ${item.type === 'food' ? 'selected' : ''}>Makan</option>
                <option value="travel" ${item.type === 'travel' ? 'selected' : ''}>Perjalanan</option>
             </select>
          </div>
          <input type="text" class="edit-input font-bold" value="${item.title}" placeholder="Nama Tempat" onchange="updateItem(${dayNum}, '${item.id}', 'title', this.value)">
          <textarea class="edit-input" placeholder="Deskripsi ringkas" onchange="updateItem(${dayNum}, '${item.id}', 'desc', this.value)">${item.desc}</textarea>
          <input type="text" class="edit-input text-blue-500" value="${item.image}" placeholder="Pautan Gambar (URL dari Google)" onchange="updateItem(${dayNum}, '${item.id}', 'image', this.value)">
          <input type="text" class="edit-input text-green-600" value="${item.waze}" placeholder="Pautan Waze" onchange="updateItem(${dayNum}, '${item.id}', 'waze', this.value)">
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="relative h-48">
          <img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover">
          <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full shadow-sm">
            <span class="text-xs font-bold text-gray-900">${item.time}</span>
          </div>
        </div>
        <div class="p-6">
          <div class="flex justify-between items-start mb-2">
            <h3 class="text-xl font-bold text-gray-900">${item.title}</h3>
            ${item.waze ? `<a href="${item.waze}" target="_blank" class="bg-green-100 p-2 rounded-xl text-green-700 hover:bg-green-200 transition"><i data-lucide="navigation" class="w-5 h-5"></i></a>` : ''}
          </div>
          <p class="text-gray-500 text-sm leading-relaxed">${item.desc}</p>
        </div>
      `;
    }
    container.appendChild(div);
  });

  if (isEditMode) {
    const addBtn = document.createElement('button');
    addBtn.className = "w-full py-4 border-2 border-dashed border-gray-300 rounded-[32px] text-gray-400 font-bold flex items-center justify-center gap-2 hover:bg-gray-50 transition";
    addBtn.innerHTML = `<i data-lucide="plus-circle"></i> Tambah Aktiviti`;
    addBtn.onclick = () => addNewSlot(dayNum);
    container.appendChild(addBtn);
  }

  lucide.createIcons();
}

// Start
showDay(1);
</script>
 </body>
</html>
