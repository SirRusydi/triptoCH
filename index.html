<!doctype html>
<html lang="ms" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cameron Highlands Itinerary - Online Sync</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    .font-heading { font-family: 'Playfair Display', serif; }
    .font-body { font-family: 'Source Sans 3', sans-serif; }
    .day-card { transition: all 0.3s ease; }
    .timeline-dot { width: 12px; height: 12px; border-radius: 50%; position: relative; z-index: 2; }
    .timeline-line { position: absolute; left: 5px; top: 12px; bottom: 0; width: 2px; }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    .tab-active { border-bottom: 3px solid #ffffff; color: #ffffff; font-weight: 700; }
    .edit-input { width: 100%; background: white; border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; margin-bottom: 5px; font-size: 0.85rem; color: #333; }
    .loader { border: 2px solid #f3f3f3; border-top: 2px solid #2d5016; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
 </head>
 <body class="h-full font-body bg-[#f0f7e6]">
  <div id="app" class="h-full w-full overflow-auto">
   
   <!-- Header -->
   <header class="relative overflow-hidden shadow-xl" style="background: linear-gradient(to right, #1a3a0a, #2d5016, #3d6b1e);">
    <div class="max-w-4xl mx-auto px-6 py-10 text-center relative z-10">
     <h1 class="font-heading text-3xl md:text-5xl text-white mb-3">Cameron Trip Online</h1>
     
     <!-- Online Status & ID -->
     <div id="onlineStatus" class="inline-flex items-center gap-3 bg-black/20 px-4 py-2 rounded-full text-white text-xs mb-6">
       <span id="tripIdDisplay">ID: Menunggu...</span>
       <button onclick="copyTripLink()" class="hover:text-green-300"><i data-lucide="copy" class="w-3 h-3"></i></button>
     </div>

     <div class="flex flex-wrap justify-center gap-3">
       <button onclick="toggleEditMode()" id="editBtn" class="bg-white text-green-900 px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-lg hover:bg-green-50 transition">
         <i data-lucide="edit-3" class="w-4 h-4"></i> <span id="editText">Ubah Itinerari</span>
       </button>
       <button onclick="saveOnline()" id="saveOnlineBtn" class="bg-green-500 text-white px-5 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-lg hover:bg-green-600 transition">
         <i data-lucide="cloud-upload" class="w-4 h-4"></i> Simpan Online
       </button>
     </div>
    </div>

    <!-- Day Tabs -->
    <div class="max-w-4xl mx-auto px-4 mt-6">
      <div class="flex border-b border-white/20" id="tabs">
       <button onclick="showDay(1)" class="tab-btn flex-1 py-3 text-center text-white/70 transition tab-active" data-day="1">HARI 1</button> 
       <button onclick="showDay(2)" class="tab-btn flex-1 py-3 text-center text-white/70 transition" data-day="2">HARI 2</button> 
       <button onclick="showDay(3)" class="tab-btn flex-1 py-3 text-center text-white/70 transition" data-day="3">HARI 3</button>
      </div>
    </div>
   </header>

   <!-- Main Content -->
   <main class="max-w-4xl mx-auto px-4 py-8 pb-24" id="content"></main>
  </div>

  <script>
// Data Asal dengan gambar yang telah dibetulkan
const initialData = [
  {
    day: 1, title: "Hari 1 — Ketibaan",
    items: [
      { id: "1", time: "09:00", type: "travel", title: "Perjalanan ke Cameron", desc: "Melalui Tapah/Simpang Pulai", icon: "car", waze: "", image: "https://images.unsplash.com/photo-1590001158193-780d0adee27b?w=800&q=80" },
      { id: "2", time: "13:00", type: "food", title: "Barracks Cafe", desc: "Makan tengahari di bangunan berek lama", icon: "utensils", waze: "https://waze.com/ul?q=Barracks+Cafe", image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800&q=80" },
      { id: "3", time: "15:00", type: "visit", title: "Ladang Teh BOH", desc: "Menikmati teh dengan pemandangan ladang", icon: "leaf", waze: "https://waze.com/ul?q=BOH+Sungei+Palas", image: "https://images.unsplash.com/photo-1597485356948-436446a80486?w=800&q=80" }
    ]
  },
  {
    day: 2, title: "Hari 2 — Penerokaan",
    items: [
      { id: "4", time: "09:00", type: "visit", title: "Big Red Strawberry", desc: "Aktiviti memetik strawberi", icon: "heart", waze: "https://waze.com/ul?q=Big+Red+Strawberry", image: "https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=800&q=80" },
      { id: "5", time: "14:00", type: "visit", title: "Kea Farm", desc: "Pasar sayur dan jagung mutiara", icon: "shopping-bag", waze: "https://waze.com/ul?q=Kea+Farm", image: "https://images.unsplash.com/photo-1488459716781-31db52582fe9?w=800&q=80" }
    ]
  },
  {
    day: 3, title: "Hari 3 — Santai & Pulang",
    items: [
      { id: "6", time: "10:00", type: "visit", title: "Flora Park", desc: "Taman bunga estetik", icon: "sun", waze: "https://waze.com/ul?q=Flora+Park", image: "https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=800&q=80" },
      { id: "7", time: "13:00", type: "travel", title: "Check Out & Pulang", desc: "Perjalanan balik", icon: "log-out", waze: "", image: "https://images.unsplash.com/photo-1542332213-9b5a5a3fad35?w=800&q=80" }
    ]
  }
];

// Pengurusan Data Online (Menggunakan MyJson/JsonBlob API)
let itinerary = initialData;
let tripBlobId = localStorage.getItem('trip_blob_id') || null;
let isEditMode = false;
let currentDay = 1;

async function initApp() {
  const urlParams = new URLSearchParams(window.location.search);
  const sharedId = urlParams.get('id');
  
  if (sharedId) {
    tripBlobId = sharedId;
    await loadOnlineData(sharedId);
  } else if (tripBlobId) {
    await loadOnlineData(tripBlobId);
  } else {
    renderDay(1);
  }
  updateStatus();
}

async function loadOnlineData(id) {
  document.getElementById('tripIdDisplay').innerHTML = `<span class="loader"></span> Memuatkan...`;
  try {
    const res = await fetch(`https://jsonblob.com/api/jsonBlob/${id}`);
    if (res.ok) {
      itinerary = await res.json();
      renderDay(currentDay);
    }
  } catch (e) {
    console.error("Gagal muat data online");
    itinerary = JSON.parse(localStorage.getItem('cameron_backup')) || initialData;
    renderDay(1);
  }
}

async function saveOnline() {
  const btn = document.getElementById('saveOnlineBtn');
  const originalText = btn.innerHTML;
  btn.innerHTML = `<span class="loader"></span> Menyimpan...`;
  btn.disabled = true;

  try {
    let res;
    if (tripBlobId) {
      res = await fetch(`https://jsonblob.com/api/jsonBlob/${tripBlobId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(itinerary)
      });
    } else {
      res = await fetch(`https://jsonblob.com/api/jsonBlob`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(itinerary)
      });
      const location = res.headers.get('Location');
      tripBlobId = location.split('/').pop();
      localStorage.setItem('trip_blob_id', tripBlobId);
    }

    if (res.ok) {
      alert("Berjaya disimpan secara atas talian!");
      updateStatus();
    }
  } catch (e) {
    alert("Gagal menyimpan. Sila cuba lagi.");
  } finally {
    btn.innerHTML = originalText;
    btn.disabled = false;
  }
}

function updateStatus() {
  const display = document.getElementById('tripIdDisplay');
  if (tripBlobId) {
    display.textContent = `Trip ID: ${tripBlobId}`;
  } else {
    display.textContent = `Status: Belum Disimpan Online`;
  }
  lucide.createIcons();
}

function copyTripLink() {
  if (!tripBlobId) return alert("Sila simpan online dahulu.");
  const url = window.location.origin + window.location.pathname + '?id=' + tripBlobId;
  navigator.clipboard.writeText(url);
  alert("Pautan unik perjalanan telah disalin ke clipboard!");
}

function toggleEditMode() {
  isEditMode = !isEditMode;
  document.getElementById('editText').textContent = isEditMode ? "Selesai & Lihat" : "Ubah Itinerari";
  document.getElementById('editBtn').classList.toggle('bg-yellow-400');
  renderDay(currentDay);
}

function updateItemData(dayNum, itemId, field, value) {
  const day = itinerary.find(d => d.day === dayNum);
  const item = day.items.find(i => i.id === itemId);
  if (item) {
    item[field] = value;
    localStorage.setItem('cameron_backup', JSON.stringify(itinerary));
  }
}

function showDay(day) {
  currentDay = day;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('tab-active', parseInt(btn.dataset.day) === day);
  });
  renderDay(day);
}

function getTypeColor(type) {
  const colors = { travel: '#6366f1', food: '#ef4444', visit: '#10b981' };
  return colors[type] || '#6b7280';
}

function renderDay(dayNum) {
  const data = itinerary.find(d => d.day === dayNum);
  const container = document.getElementById('content');
  container.innerHTML = `<h2 class="font-heading text-2xl text-gray-800 mb-6">${data.title}</h2><div class="space-y-4">`;

  data.items.forEach((item, i) => {
    const color = getTypeColor(item.type);
    let itemHtml = '';

    if (isEditMode) {
      itemHtml = `
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-400 fade-in">
          <input type="time" class="edit-input font-bold" value="${item.time}" onchange="updateItemData(${dayNum},'${item.id}','time',this.value)">
          <input type="text" class="edit-input font-bold" value="${item.title}" onchange="updateItemData(${dayNum},'${item.id}','title',this.value)">
          <textarea class="edit-input" onchange="updateItemData(${dayNum},'${item.id}','desc',this.value)">${item.desc}</textarea>
          <input type="text" class="edit-input text-blue-500 text-xs" placeholder="URL Gambar" value="${item.image}" onchange="updateItemData(${dayNum},'${item.id}','image',this.value)">
        </div>`;
    } else {
      itemHtml = `
        <div class="day-card flex gap-4 fade-in">
          <div class="flex flex-col items-center pt-1">
            <div class="timeline-dot" style="background:${color};"></div>
            ${i < data.items.length - 1 ? `<div class="timeline-line" style="background:${color}20;"></div>` : ''}
          </div>
          <div class="flex-1 bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col md:flex-row">
            <div class="md:w-1/3 h-32 md:h-auto">
              <img src="${item.image}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400'">
            </div>
            <div class="p-4 flex-1">
              <span class="text-xs font-bold px-2 py-0.5 rounded" style="color:${color};background:${color}15;">${item.time}</span>
              <h3 class="font-bold text-gray-800 mt-1 flex items-center gap-2">
                <i data-lucide="${item.icon || 'map-pin'}" class="w-4 h-4" style="color:${color}"></i> ${item.title}
              </h3>
              <p class="text-sm text-gray-600 mt-1">${item.desc}</p>
              ${item.waze ? `<a href="${item.waze}" target="_blank" class="inline-flex items-center gap-1 text-[10px] mt-2 font-bold text-green-700 bg-green-50 px-2 py-1 rounded">WAZE <i data-lucide="external-link" class="w-2 h-2"></i></a>` : ''}
            </div>
          </div>
        </div>`;
    }
    container.innerHTML += itemHtml;
  });

  container.innerHTML += '</div>';
  lucide.createIcons();
}

// Jalankan App
initApp();
</script>
 </body>
</html>
